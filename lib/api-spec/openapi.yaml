openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Roomie API - Chore rotation and expense splitting for shared households
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: households
    description: Household management
  - name: chores
    description: Chore management
  - name: assignments
    description: Chore assignments
  - name: expenses
    description: Expense tracking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the current logged-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /households:
    post:
      operationId: createHousehold
      tags: [households]
      summary: Create a new household (caller becomes admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseholdInput"
      responses:
        "201":
          description: Household created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: User already belongs to a household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /households/me:
    get:
      operationId: getMyHousehold
      tags: [households]
      summary: Get the current user's household
      responses:
        "200":
          description: Household details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"
        "404":
          description: Not in a household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /households/join:
    post:
      operationId: joinHousehold
      tags: [households]
      summary: Join a household via invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinHouseholdInput"
      responses:
        "200":
          description: Joined household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invite code not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already in a household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /households/me/members:
    get:
      operationId: getHouseholdMembers
      tags: [households]
      summary: List all members of the current user's household
      responses:
        "200":
          description: Members list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        "404":
          description: Not in a household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chores:
    get:
      operationId: listChores
      tags: [chores]
      summary: List all chores in the current household
      responses:
        "200":
          description: Chore list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chore"
    post:
      operationId: createChore
      tags: [chores]
      summary: Create a new chore (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChoreInput"
      responses:
        "201":
          description: Chore created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chore"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chores/{choreId}:
    patch:
      operationId: updateChore
      tags: [chores]
      summary: Update a chore (admin only)
      parameters:
        - name: choreId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChoreUpdate"
      responses:
        "200":
          description: Updated chore
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chore"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteChore
      tags: [chores]
      summary: Delete a chore (admin only)
      parameters:
        - name: choreId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chores/{choreId}/rotation:
    patch:
      operationId: updateChoreRotation
      tags: [chores]
      summary: Update the rotation order for a chore (admin only)
      parameters:
        - name: choreId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotationInput"
      responses:
        "200":
          description: Updated chore
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chore"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /assignments/today:
    get:
      operationId: getTodayAssignments
      tags: [assignments]
      summary: Get today's chore assignment for the current user
      responses:
        "200":
          description: Today's assignment(s)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"

  /assignments/upcoming:
    get:
      operationId: getUpcomingAssignments
      tags: [assignments]
      summary: Get upcoming 14 days of household chore assignments
      responses:
        "200":
          description: Upcoming assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"

  /assignments/history:
    get:
      operationId: getAssignmentHistory
      tags: [assignments]
      summary: Get recent completed assignment history for the household
      responses:
        "200":
          description: Assignment history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"

  /assignments/{assignmentId}/done:
    patch:
      operationId: markAssignmentDone
      tags: [assignments]
      summary: Mark a chore assignment as done
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "403":
          description: Not your assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Assignment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List all expenses for the current household
      responses:
        "200":
          description: Expenses list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Log a new expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Expense created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /expenses/{expenseId}:
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - name: expenseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Not your expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /expenses/balances:
    get:
      operationId: getBalances
      tags: [expenses]
      summary: Get running balance per member in the household
      responses:
        "200":
          description: Balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemberBalance"

  /expenses/settle:
    get:
      operationId: getSettleUp
      tags: [expenses]
      summary: Get minimum set of transactions to settle all debts
      responses:
        "200":
          description: Settlement transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SettlementTransaction"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # Auth
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        password:
          type: string
          minLength: 6

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthUser:
      type: object
      required: [id, name, email, householdId, isAdmin]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        householdId:
          type: ["integer", "null"]
        isAdmin:
          type: boolean

    # Households
    HouseholdInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    JoinHouseholdInput:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string

    Household:
      type: object
      required: [id, name, inviteCode, adminUserId]
      properties:
        id:
          type: integer
        name:
          type: string
        inviteCode:
          type: string
        adminUserId:
          type: integer

    Member:
      type: object
      required: [id, name, email, joinedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        joinedAt:
          type: string

    # Chores
    ChoreInput:
      type: object
      required: [name, frequency, rotationOrder]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        frequency:
          type: string
          enum: [daily, weekly, custom]
        customDays:
          type: ["string", "null"]
          description: Comma-separated weekday numbers for custom frequency (e.g. "1,3,5")
        rotationOrder:
          type: array
          items:
            type: integer
          description: Ordered list of user IDs

    ChoreUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        frequency:
          type: string
          enum: [daily, weekly, custom]
        customDays:
          type: ["string", "null"]

    RotationInput:
      type: object
      required: [rotationOrder]
      properties:
        rotationOrder:
          type: array
          items:
            type: integer

    Chore:
      type: object
      required: [id, householdId, name, frequency, rotationOrder]
      properties:
        id:
          type: integer
        householdId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        frequency:
          type: string
        customDays:
          type: ["string", "null"]
        rotationOrder:
          type: array
          items:
            type: integer

    # Assignments
    Assignment:
      type: object
      required: [id, choreId, choreName, userId, userName, date, status]
      properties:
        id:
          type: integer
        choreId:
          type: integer
        choreName:
          type: string
        userId:
          type: integer
        userName:
          type: string
        date:
          type: string
        status:
          type: string
          enum: [pending, done]
        confirmedAt:
          type: ["string", "null"]

    # Expenses
    ExpenseInput:
      type: object
      required: [amount, description, paidBy, splitAmong]
      properties:
        amount:
          type: number
        description:
          type: string
          minLength: 1
        paidBy:
          type: integer
          description: User ID who paid
        date:
          type: string
          description: ISO date string, defaults to today
        splitAmong:
          type: array
          items:
            type: integer
          description: User IDs to split among (defaults to all members)

    Expense:
      type: object
      required: [id, householdId, paidBy, paidByName, amount, description, date, splits]
      properties:
        id:
          type: integer
        householdId:
          type: integer
        paidBy:
          type: integer
        paidByName:
          type: string
        amount:
          type: number
        description:
          type: string
        date:
          type: string
        splits:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseSplit"

    ExpenseSplit:
      type: object
      required: [userId, userName, shareAmount]
      properties:
        userId:
          type: integer
        userName:
          type: string
        shareAmount:
          type: number

    MemberBalance:
      type: object
      required: [userId, userName, balance]
      properties:
        userId:
          type: integer
        userName:
          type: string
        balance:
          type: number
          description: Positive means they're owed money; negative means they owe money

    SettlementTransaction:
      type: object
      required: [fromUserId, fromUserName, toUserId, toUserName, amount]
      properties:
        fromUserId:
          type: integer
        fromUserName:
          type: string
        toUserId:
          type: integer
        toUserName:
          type: string
        amount:
          type: number
